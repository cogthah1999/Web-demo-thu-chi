<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org">
<head>
    <title>Chỉnh sửa giao dịch</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        h2 { color: #2c3e50; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-save { width: 100%; padding: 12px; background-color: #3498db; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.3s; }
        .btn-save:hover { background-color: #2980b9; }
        .btn-cancel { display: block; margin-top: 15px; color: #7f8c8d; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Chỉnh Sửa ✏️</h2>
        <form th:action="@{/update}" method="post">
            <input type="hidden" name="id" th:value="${payment.id}">
            <input type="text" name="paymentType" th:value="${payment.paymentType}" placeholder="Loại giao dịch" required>
            <input type="number" name="amount" th:value="${payment.amount}" placeholder="Số tiền" required>
            <button type="submit" class="btn-save">Lưu thay đổi</button>
            <a href="/" class="btn-cancel">Quay lại trang chủ</a>
        </form>
    </div>
</body>
</html>
